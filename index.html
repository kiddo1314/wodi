<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>谁是卧底</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#f5f7fa;padding:20px;max-width:400px;margin:0 auto}
.page{display:none;padding:20px 0}
.page.active{display:block}
.card{background:white;border-radius:16px;padding:24px;margin:16px 0}
.title{font-size:20px;text-align:center;margin-bottom:20px}
.btn{width:100%;padding:16px;background:#007aff;color:white;border:none;border-radius:12px;margin:8px 0;font-size:16px}
.words{font-size:24px;font-weight:bold;text-align:center;color:#007aff;margin:20px 0}
.identity{text-align:center;margin-bottom:10px}
.players{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
.player{flex:1;min-width:60px;padding:12px;border:1px solid #ddd;border-radius:12px;text-align:center}
.player.voted{background:#ffeeee;border-color:red}
</style>
</head>
<body>

<div class="page active" id="page-home">
  <div class="title">谁是卧底</div>
  <div class="card">
    <button class="btn" onclick="start(4)">4人局</button>
    <button class="btn" onclick="start(5)">5人局</button>
    <button class="btn" onclick="start(6)">6人局</button>
  </div>
</div>

<div class="page" id="page-word">
  <div class="title">你的身份</div>
  <div class="card">
    <div class="identity" id="role"></div>
    <div class="words" id="word"></div>
    <button class="btn" onclick="next()">我记住了，下一位</button>
  </div>
</div>

<div class="page" id="page-vote">
  <div class="title">投票谁是卧底</div>
  <div class="card">
    <div class="players" id="vote-list"></div>
    <button class="btn" onclick="doVote()">确认投票</button>
  </div>
</div>

<div class="page" id="page-result">
  <div class="title">游戏结束</div>
  <div class="card">
    <div id="result" style="text-align:center;margin-bottom:16px"></div>
    <div id="answer" style="text-align:center;color:#666"></div>
    <button class="btn" onclick="goHome()">再来一局</button>
  </div>
</div>

<script>
const game = {
  total:0, current:1, under:0, words:[], roles:[], vote:null
};

const list = [
  ["牛奶","酸奶"],["公交","地铁"],["西瓜","哈密瓜"],
  ["微信","QQ"],["眼镜","墨镜"],["钢笔","铅笔"]
];

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function start(n){
  game.total = n;
  game.current = 1;
  const pair = list[Math.floor(Math.random()*list.length)];
  game.words = pair;
  game.roles = [];
  game.under = Math.floor(Math.random()*n);
  for(let i=0;i<n;i++){
    game.roles.push(i === game.under ? "under" : "normal");
  }
  showWord();
  show("page-word");
}

function showWord(){
  const i = game.current-1;
  const r = game.roles[i];
  document.getElementById("role").innerText = r==="under"?"你是：卧底":"你是：平民";
  document.getElementById("word").innerText = r==="under" ? game.words[1] : game.words[0];
}

function next(){
  game.current++;
  if(game.current > game.total){
    show("page-vote");
    renderVote();
  }else{
    showWord();
  }
}

function renderVote(){
  const el = document.getElementById("vote-list");
  el.innerHTML = "";
  for(let i=1;i<=game.total;i++){
    const d = document.createElement("div");
    d.className = "player";
    d.innerText = i+"号";
    d.onclick = ()=>{
      document.querySelectorAll(".player").forEach(x=>x.classList.remove("voted"));
      d.classList.add("voted");
      game.vote = i;
    }
    el.appendChild(d);
  }
}

function doVote(){
  if(!game.vote) return alert("请选择玩家");
  const win = game.vote-1 === game.under;
  document.getElementById("result").innerText = win ? "平民胜利！" : "卧底胜利！";
  document.getElementById("answer").innerText = "平民："+game.words[0]+"  卧底："+game.words[1];
  show("page-result");
}

function goHome(){ show("page-home") }
</script>
</body>
</html>
